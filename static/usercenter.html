<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>用户中心 | 非凡故事</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="/static/styles/app-nav.css" />
    <link rel="stylesheet" href="/static/styles/usercenter.css" />
  </head>
  <body>
    <aside class="app-sidebar" aria-label="主导航">
      <a id="nav-logo" class="app-logo-link" href="/create?stage=basic" aria-label="回到创作台" title="回到创作台">
        <img class="app-logo" src="/static/logo2.png" alt="非凡故事" />
      </a>

      <nav class="nav-items" aria-label="主导航">
        <a id="nav-create" class="nav-item" href="/create?stage=basic" aria-label="创作台" title="创作台">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
            <path d="M5.4 15.6c2.6-.7 4.8-2 6.6-3.9 2-2.1 3-4.6 3.3-7.4-2.8.3-5.3 1.4-7.4 3.3-1.9 1.8-3.2 4-3.9 6.6l1.4 1.4Z"></path>
            <path d="M8.2 11.8 4 16"></path>
          </svg>
          <span class="nav-label">创作台</span>
        </a>
        <a id="nav-works" class="nav-item" href="/works" aria-label="作品管理" title="作品管理">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <rect x="4" y="3" width="12" height="14" rx="1.4"></rect>
            <path d="M7 3v14M9 7h4"></path>
          </svg>
          <span class="nav-label">作品管理</span>
        </a>
        <a id="nav-notes" class="nav-item" href="/mynote" aria-label="我的笔记" title="我的笔记">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
            <path d="M10 16.2 4.7 11.5a3.5 3.5 0 0 1 5-4.9L10 7l.3-.4a3.5 3.5 0 0 1 5 4.9L10 16.2Z"></path>
          </svg>
          <span class="nav-label">我的笔记</span>
        </a>
        <a id="nav-usercenter" class="nav-item active app-nav-user" href="/usercenter" aria-label="用户中心" title="用户中心">
          <span class="nav-user-avatar" aria-hidden="true">游</span>
        </a>
      </nav>
    </aside>

    <main class="main">
      <div class="content">
        <div id="user-message" class="message hidden" role="status"></div>

        <section class="profile-hero">
          <div class="avatar-wrap">
            <div id="profile-avatar" class="avatar" aria-hidden="true">创</div>
            <div class="member-ring" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 2.7 12.1 7l4.7.7-3.4 3.3.8 4.7L10 13.5 5.8 15.7l.8-4.7-3.4-3.3L7.9 7 10 2.7Z"></path>
              </svg>
            </div>
          </div>
          <h1 id="profile-name" class="profile-name">创作者</h1>
          <div class="profile-tags">
            <span id="profile-status" class="tag-pill tag-member">已登录</span>
            <span id="profile-contact" class="tag-pill tag-plain">持续创作中</span>
          </div>
          <p id="profile-bio" class="profile-bio">你的作品、收藏和创作进度会在这里汇总。</p>
          <a id="profile-auth-action" class="edit-btn" href="/auth">登录/注册</a>
        </section>

        <section class="milestones" aria-label="创作统计">
          <div class="milestone">
            <div class="milestone-value" id="stat-works">0</div>
            <div class="milestone-label">作品</div>
          </div>
          <div class="milestone">
            <div class="milestone-value" id="stat-notes">0</div>
            <div class="milestone-label">收藏句子</div>
          </div>
          <div class="milestone">
            <div class="milestone-value" id="stat-words">0<em>字</em></div>
            <div class="milestone-label">正文累计</div>
          </div>
        </section>

        <section class="shelf-section">
          <div class="shelf-tabs" role="tablist" aria-label="用户中心内容">
            <button type="button" class="shelf-tab active" data-tab="works">我的作品<span id="tab-works-count" class="shelf-tab-count">0</span></button>
            <button type="button" class="shelf-tab" data-tab="notes">我的收藏<span id="tab-notes-count" class="shelf-tab-count">0</span></button>
          </div>

          <div id="panel-works" class="shelf-panel active">
            <div id="user-books-row" class="books-row"></div>
          </div>
          <div id="panel-notes" class="shelf-panel">
            <div id="user-notes-list" class="note-mini-list"></div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/static/usercenter.js?v=20260502-shell"></script>
  </body>
</html>
